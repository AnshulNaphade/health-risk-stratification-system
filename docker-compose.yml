
services:
  postgres:
    image: postgres:16-alpine
    container_name: healthrisk-db
    environment:
      POSTGRES_DB: healthrisk
      POSTGRES_USER: healthrisk_user
      POSTGRES_PASSWORD: healthrisk_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthrisk_user -d healthrisk"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: